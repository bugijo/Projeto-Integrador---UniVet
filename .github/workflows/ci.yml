name: UniVet CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize database
        run: python init_db.py

      - name: Validate syntax
        run: python -m py_compile app.py init_db.py run_server.py

      - name: Run tests
        run: python -m unittest discover -s tests -v

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger external deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Smoke test
        if: ${{ secrets.PRODUCTION_BASE_URL != '' }}
        env:
          PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
        run: curl -fsSL "$PRODUCTION_BASE_URL/login"
